<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>TI-30XS Emulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <!-- Multiview Screen -->
        <div class="screen">
            <div id="history" class="line line-1"></div>
            <div id="display" class="line line-2">0</div>
        </div>

        <!-- D-Pad and Menu row -->
        <div class="control-row">
            <button class="btn-menu">mode</button>
            <div class="d-pad">
                <button class="arrow up">▲</button>
                <div class="side-arrows">
                    <button class="arrow left">◀</button>
                    <button class="arrow right">▶</button>
                </div>
                <button class="arrow down">▼</button>
            </div>
            <button class="btn-menu">delete</button>
        </div>

        <div class="keypad">
            <!-- Row 1 -->
            <button class="btn-sci" onclick="mathFunc('frac')">n/d</button>
            <button class="btn btn-2nd" onclick="mathFunc('2nd')">2nd</button>
            <button class="btn-sci" onclick="mathFunc('pow')">x²</button>
            <button class="btn-sci" onclick="mathFunc('sqrt')">√</button>
            <button class="btn-op" onclick="clearScreen()">on/ac</button>

            <!-- Row 2 -->
            <button class="btn-num" onclick="appendNumber('7')">7</button>
            <button class="btn-num" onclick="appendNumber('8')">8</button>
            <button class="btn-num" onclick="appendNumber('9')">9</button>
            <button class="btn-op" onclick="appendOperator('/')">÷</button>
            <button class="btn-sci" onclick="mathFunc('sin')">sin</button>

            <!-- Row 3 -->
            <button class="btn-num" onclick="appendNumber('4')">4</button>
            <button class="btn-num" onclick="appendNumber('5')">5</button>
            <button class="btn-num" onclick="appendNumber('6')">6</button>
            <button class="btn-op" onclick="appendOperator('*')">×</button>
            <button class="btn-sci" onclick="mathFunc('cos')">cos</button>

            <!-- Row 4 -->
            <button class="btn-num" onclick="appendNumber('1')">1</button>
            <button class="btn-num" onclick="appendNumber('2')">2</button>
            <button class="btn-num" onclick="appendNumber('3')">3</button>
            <button class="btn-op" onclick="appendOperator('-')">−</button>
            <button class="btn-sci" onclick="mathFunc('tan')">tan</button>

            <!-- Row 5 -->
            <button class="btn-num" onclick="appendNumber('0')">0</button>
            <button class="btn-num" onclick="appendNumber('.')">.</button>
            <button class="btn-sci" onclick="mathFunc('toggle')">≈</button>
            <button class="btn-op" onclick="appendOperator('+')">+</button>
            <button class="btn-enter" onclick="calculate()">enter</button>
        </div>
    </div>
</body>
</html>
